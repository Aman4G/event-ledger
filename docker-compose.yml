services:
  account-service:
    build:
      context: ./account-service
    container_name: account-service
    ports:
      - "8081:8081"

  event-gateway-service:
    build:
      context: ./event-gateway-service
    container_name: event-gateway-service
    ports:
      - "8080:8080"
    environment:
      ACCOUNT_SERVICE_BASE_URL: http://account-service:8081
    depends_on:
      - account-service